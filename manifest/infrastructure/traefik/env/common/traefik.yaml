# yaml-language-server: $schema=https://raw.githubusercontent.com/traefik/traefik-helm-chart/v37.4.0/traefik/values.schema.json
deployment:
  replicas: 2

providers:
  kubernetesCRD:
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true

logs:
  access:
    enabled: true

metrics:
  addInternals: true
  prometheus:
    service:
      enabled: true
    disableAPICheck: true
    serviceMonitor:
      enabled: true

additionalArguments:
  - "--api.insecure=true"

ports:
  web:
    port: 80
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 443
    exposedPort: 443
    protocol: TCP
    http3:
      enabled: true

service:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv6
    - IPv4

extraObjects:
  - apiVersion: v1
    kind: Service
    metadata:
      name: traefik-api
    spec:
      type: ClusterIP
      selector:
        app.kubernetes.io/name: traefik
      ports:
        - port: 80
          name: traefik
          targetPort: traefik
          protocol: TCP
