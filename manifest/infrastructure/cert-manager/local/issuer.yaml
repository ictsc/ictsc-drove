apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: common-issuer
spec:
  acme:
    email: cert-manager@icttoracon.net
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: common-issuer-key
    solvers:w
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: traefik-gateway
                namespace: traefik
                kind: Gateway
